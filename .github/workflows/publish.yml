name: Publish to PyPI

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # Required for OIDC trusted publishing

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip build twine

      - name: Install and run core tests
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev]"
          python -m pytest \
            tests/test_quantizer.py \
            tests/test_learned_codebooks.py \
            tests/test_bias_correction.py \
            -v --tb=short

      - name: Build distribution
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Uses OIDC trusted publishing — no API token secrets required.
        # Configure trusted publishing at https://pypi.org/manage/account/publishing/
        # with: publisher: GitHub Actions, repo: danhicks96/PrismKV, workflow: publish.yml
