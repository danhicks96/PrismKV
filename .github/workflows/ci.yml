name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # -----------------------------------------------------------------------
  # test-core: quantizer + learned codebooks + bias correction + bit_alloc
  # No transformers required. Must pass in <2 min.
  # Coverage scoped to src/prismkv/quantizer only.
  # -----------------------------------------------------------------------
  test-core:
    name: Core tests (no transformers)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install core dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev]"

      - name: Run core tests
        run: |
          python -m pytest \
            tests/test_quantizer.py \
            tests/test_learned_codebooks.py \
            tests/test_bias_correction.py \
            tests/test_bit_alloc.py \
            tests/test_polar_attention.py \
            tests/test_e2e_benchmark.py \
            tests/test_m12_framework_agnostic.py \
            tests/test_calibration_quality.py \
            -v --tb=short

      - name: Coverage (core quantizer modules)
        run: |
          pip install pytest-cov
          python -m pytest \
            tests/test_quantizer.py \
            tests/test_learned_codebooks.py \
            tests/test_bias_correction.py \
            tests/test_bit_alloc.py \
            tests/test_polar_attention.py \
            tests/test_e2e_benchmark.py \
            tests/test_m12_framework_agnostic.py \
            tests/test_calibration_quality.py \
            --cov=src/prismkv/quantizer \
            --cov-report=term-missing \
            --cov-fail-under=85

  # -----------------------------------------------------------------------
  # test-eval: full suite including RAG, cache, KV collector, benchmark
  # Requires transformers + networkx. Permitted 10 min.
  # -----------------------------------------------------------------------
  test-eval:
    name: Eval + cache + RAG tests (transformers)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install all dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev,eval,cache,rag]"

      - name: Run full test suite
        timeout-minutes: 10
        run: |
          python -m pytest \
            tests/test_kv_collector.py \
            tests/test_kv_cache.py \
            tests/test_bit_alloc.py \
            tests/test_rag_adapters.py \
            tests/test_rag_ingestion.py \
            tests/test_rag_engine.py \
            tests/test_m10_persistence.py \
            tests/test_model_arch.py \
            tests/test_e2e_benchmark.py \
            tests/test_real_data_validation.py \
            -v --tb=short

      - name: Pseudo-perplexity quality gate
        timeout-minutes: 5
        run: |
          python -c "
          # NOTE: measure_pseudo_perplexity uses a fresh PrismKVCache per token prediction.
          # This means the quantizer calibrates on very few vectors for early tokens
          # (prefix length = token index), inflating the delta vs a warm-up scenario.
          # Threshold is 1.5 nats/token — a 'no catastrophic failure' gate rather than
          # a tight quality bar. Typical well-calibrated delta is ~0.2 nats at 4 bits/dim.
          from prismkv.eval.e2e_benchmark import measure_pseudo_perplexity
          scores = measure_pseudo_perplexity(model_name='gpt2', n_tokens=64, bits_configs=[4])
          fp16 = scores['fp16']
          p4 = scores['prismkv_4bit']
          delta = p4 - fp16
          print(f'fp16={fp16:.4f}  prismkv_4bit={p4:.4f}  delta={delta:.4f}')
          assert delta < 1.5, f'Pseudo-perplexity delta {delta:.4f} >= 1.5 nats/token at 4 bits/dim'
          print('PASS: perplexity delta < 1.5 nats/token')
          "
